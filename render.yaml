services:
  - type: web
    name: blacklist-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: |
      apt-get install -y cmake libopenblas-dev liblapack-dev
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
